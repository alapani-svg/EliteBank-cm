<div class="bell-wrap">
  <button #bellBtn class="bell-btn" (click)="toggle($event)" [title]="'notif.bellTitle' | t">
    <span class="material-symbols-outlined">notifications</span>
    <span class="bell-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
  </button>

  <div class="bell-dropdown" *ngIf="open"
       [style.top]="dropdownStyle.top"
       [style.right]="dropdownStyle.right"
       (click)="$event.stopPropagation()">
    <div class="dropdown-head">
      <span class="head-title">{{ 'notif.bellTitle' | t }}</span>
      <button class="head-link" (click)="markAllRead($event)" [disabled]="unreadCount === 0">
        {{ 'notif.bellMarkAll' | t }}
      </button>
    </div>

    <div class="dropdown-body">
      <div *ngIf="items.length === 0" class="dd-empty">
        <span class="material-symbols-outlined">notifications_off</span>
        <p>{{ 'notif.bellAllCaughtUp' | t }}</p>
      </div>

      <div *ngIf="items.length > 0" class="dd-list">
        <button class="dd-row" *ngFor="let n of items" [class.unread]="!n.read" (click)="click(n)">
          <div class="dd-icon" [class]="'kind-' + n.kind.toLowerCase()">
            <span class="material-symbols-outlined">{{ iconFor(n.category) }}</span>
          </div>
          <div class="dd-text">
            <span class="dd-title">{{ n.title }}</span>
            <span class="dd-body" *ngIf="n.body">{{ n.body }}</span>
            <span class="dd-time">{{ n.created_at | date:'dd MMM · HH:mm' }}</span>
          </div>
          <span class="dd-dot" *ngIf="!n.read"></span>
        </button>
      </div>
    </div>

    <a class="dropdown-foot" routerLink="/notifications" (click)="open = false">
      {{ 'notif.bellViewAll' | t }}
      <span class="material-symbols-outlined">arrow_forward</span>
    </a>
  </div>
</div>
