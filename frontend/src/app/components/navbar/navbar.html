<header class="main-header">
    <div class="container header-container">
        <!-- Logo -->
        <div class="logo-wrapper">
            <a routerLink="/" class="logo-text">ELITE<span>BANK</span></a>
        </div>

        <!-- Desktop Navigation -->
        <nav class="nav-links">
            <a routerLink="/" class="nav-item active">Home</a>
            <a routerLink="/register" class="nav-item">Private Banking</a>
            <a routerLink="/register" class="nav-item">Wealth</a>
            <a routerLink="/register" class="nav-item">Company</a>
        </nav>

        <!-- Header Actions -->
        <div class="header-actions">
            <a class="btn-icon" routerLink="/login" aria-label="Sign in">
                <span class="material-symbols-outlined">login</span>
            </a>

            <div class="auth-group">
                <a class="btn-text" routerLink="/login">Log In</a>
                <a class="btn-premium" routerLink="/register">
                    Join Elite
                    <span class="material-symbols-outlined">arrow_forward</span>
                </a>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle Menu" type="button">
                <span class="material-symbols-outlined">{{ mobileOpen ? 'close' : 'menu' }}</span>
            </button>
        </div>
    </div>

    <!-- Mobile menu panel -->
    <div class="mobile-menu" [class.open]="mobileOpen" (click)="closeMobile()">
        <nav class="mobile-nav" (click)="$event.stopPropagation()">
            <a routerLink="/" class="mobile-nav-item" (click)="closeMobile()">Home</a>
            <a routerLink="/register" class="mobile-nav-item" (click)="closeMobile()">Private Banking</a>
            <a routerLink="/register" class="mobile-nav-item" (click)="closeMobile()">Wealth</a>
            <a routerLink="/register" class="mobile-nav-item" (click)="closeMobile()">Company</a>
            <a routerLink="/login" class="mobile-nav-item mobile-secondary" (click)="closeMobile()">Log In</a>
            <a routerLink="/register" class="mobile-nav-item mobile-primary" (click)="closeMobile()">
                Join Elite
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
        </nav>
    </div>
</header>
