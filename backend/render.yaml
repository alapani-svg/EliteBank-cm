# Render Blueprint — auto-provisions a Postgres database + a Django web service.
# Connect this repo on render.com → New + → Blueprint → select repo.
# Reference: https://render.com/docs/blueprint-spec

databases:
  - name: elite-bank-db
    databaseName: elite_bank
    user: elite_bank
    plan: free
    region: oregon            # or frankfurt / singapore — closest to Cameroon

services:
  - type: web
    name: elite-bank-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a strong random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: elite-bank-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false                # set manually after first Vercel deploy
      - key: NOTCHPAY_PUBLIC_KEY
        sync: false                # leave empty for demo mode, or set sandbox key
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
